<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Notes —Group 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sticky-notes-muhammad.css" />
  </head>
  <body>
    <!-- Page heading -->
    <header class="app-header">
      <h1 class="app-title">Sticky Notes App</h1>
    </header>

    <!-- Notes grid -->
    <main class="notes-grid" id="notesGrid">
      <!-- Notes are injected here by JS -->

      <!-- Add note button card -->
      <button
        class="note-card note-card--add"
        id="btnAddNote"
        type="button"
        aria-label="Add a new note"
      >
        <span class="note-card__plus" aria-hidden="true">+</span>
      </button>
    </main>

    <script src="sticky-notes-muhammad.js"></script>
  </body>
</html>
